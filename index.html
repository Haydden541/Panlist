<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanPastel 全色号核对工具</title>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --bg: #f0f2f5; 
            --owned-bg: #e6fffa; 
            --owned-border: #38b2ac; 
            --text-main: #2d3436;
        }
        body { font-family: -apple-system, "SF Pro Text", sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text-main); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        
        .search-box { 
            display: flex; gap: 8px; position: sticky; top: 10px; 
            background: white; padding: 10px 0; z-index: 100; border-bottom: 2px solid var(--bg);
            margin-bottom: 15px;
        }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .add-btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .category-title { 
            background: #f8f9fa; border-left: 5px solid var(--primary); 
            padding: 10px 15px; margin: 25px 0 12px; font-weight: bold; font-size: 0.95rem; display: flex; justify-content: space-between;
        }
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        
        .color-card { 
            padding: 12px 8px; border: 1px solid #edf2f7; border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            transition: all 0.2s ease; background: #fff; position: relative;
        }
        .color-card:active { transform: scale(0.95); }
        
        .color-card.is-owned { 
            background: var(--owned-bg); border: 2px solid var(--owned-border); 
            box-shadow: 0 2px 5px rgba(56, 178, 172, 0.2);
        }
        .color-card.is-owned::after { 
            content: "✓"; position: absolute; top: 4px; right: 6px; 
            color: var(--owned-border); font-size: 12px; font-weight: bold; 
        }
        
        .color-no { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
        .color-name { font-size: 0.65rem; color: #718096; text-align: center; line-height: 1.2; height: 2.4em; overflow: hidden; }

        .summary-bar { 
            margin-top: 30px; padding: 15px; background: var(--primary); 
            color: white; border-radius: 10px; text-align: center; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>PanPastel 色号清单</h2>
    </div>

    <div class="search-box">
        <input type="text" id="colorInput" placeholder="输入色号 (如: 220.5)" inputmode="decimal">
        <button class="add-btn" onclick="toggleByInput()">标记</button>
    </div>

    <div id="mainDisplay"></div>
    
    <div class="summary-bar" id="summary"></div>
    <button onclick="clearAll()" style="width:100%; margin-top:10px; background:none; border:none; color:#a0aec0; font-size:12px; cursor:pointer;">清空所有已购记录</button>
</div>

        "740.3": { name: "Burnt Sienna Shade", cat: "大地/棕色系" },

        // 金属色与珠光系
        "910.5": { name: "Light Gold", cat: "金属/珠光系" },
        "911.5": { name: "Rich Gold", cat: "金属/珠光系" },

        "931.5": { name: "Pewter", cat: "金属/珠光系" },
        "951.5": { name: "Pearlescent White", cat: "金属/珠光系" },
        "952.5": { name: "Pearlescent Yellow", cat: "金属/珠光系" },
        "953.5": { name: "Pearlescent Orange", cat: "金属/珠光系" },
        "954.5": { name: "Pearlescent Red", cat: "金属/珠光系" },
        "955.5": { name: "Pearlescent Violet", cat: "金属/珠光系" },
        "956.5": { name: "Pearlescent Blue", cat: "金属/珠光系" },
        "957.5": { name: "Pearlescent Green", cat: "金属/珠光系" },
        "011": { name: "Pearl Medium Fine", cat: "金属/珠光系" },
        "012": { name: "Pearl Medium Coarse", cat: "金属/珠光系" }
    };

    let ownedColors = JSON.parse(localStorage.getItem('panOwned97')) || [];

    function render() {
        const display = document.getElementById('mainDisplay');
        display.innerHTML = '';
        
        const categories = {};
        Object.keys(PAN_DATABASE).forEach(no => {
            const cat = PAN_DATABASE[no].cat;
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(no);
        });

        const order = ["基础/灰阶", "黄/橙系", "红/紫系", "蓝系", "绿系", "大地/棕色系", "金属/珠光系"];
        
        order.forEach(catName => {
            if (!categories[catName]) return;
            const section = document.createElement('div');
            section.innerHTML = `<div class="category-title"><span>${catName}</span><span>(${categories[catName].filter(n=>ownedColors.includes(n)).length}/${categories[catName].length})</span></div>`;
            const grid = document.createElement('div');
            grid.className = 'color-grid';
            
            categories[catName].forEach(no => {
                const isOwned = ownedColors.includes(no);
                const card = document.createElement('div');
                card.className = `color-card ${isOwned ? 'is-owned' : ''}`;
                card.innerHTML = `
                    <div class="color-no">${no}</div>
                    <div class="color-name">${PAN_DATABASE[no].name}</div>
                `;
                card.onclick = () => updateOwned(no);
                grid.appendChild(card);
            });
            section.appendChild(grid);
            display.appendChild(section);
        });
        
        document.getElementById('summary').innerText = `全部色库: ${Object.keys(PAN_DATABASE).length} 色 | 已点亮: ${ownedColors.length} 色`;
        localStorage.setItem('panOwned97', JSON.stringify(ownedColors));
    }

    function updateOwned(no) {
        if (ownedColors.includes(no)) {
            ownedColors = ownedColors.filter(i => i !== no);
        } else {
            ownedColors.push(no);
        }
        render();
    }

    function toggleByInput() {
        const input = document.getElementById('colorInput');
        const val = input.value.trim();
        if (!val) return;
        if (PAN_DATABASE[val]) {
            updateOwned(val);
            document.querySelector(`div[onclick*="${val}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            alert("未在 PanPastel 标准库中找到该色号。请检查输入是否正确（如 220.5）。");
        }
        input.value = '';
    }

    function clearAll() {
        if(confirm("确定要清空所有已购记录吗？")) {
            ownedColors = [];
            render();
        }
    }

    render();
</script>

</body>
</html>
