<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanPastel 库存管理(支持跨设备备份)</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --owned-bg: #e6fffa; --owned-border: #38b2ac; --text-main: #2d3436; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text-main); -webkit-user-select: none; user-select: none; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.2rem; }
        
        /* 备份工具栏 */
        .backup-tools { display: flex; gap: 8px; }
        .tool-btn { font-size: 11px; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; color: #666; }
        .tool-btn:hover { border-color: var(--primary); color: var(--primary); }

        .search-box { display: flex; gap: 8px; position: sticky; top: 10px; background: white; padding: 10px 0; z-index: 100; border-bottom: 2px solid var(--bg); margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .add-btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .category-title { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 10px 15px; margin: 25px 0 12px; font-weight: bold; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
        .color-card { padding: 15px 8px; border: 1px solid #edf2f7; border-radius: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.1s ease; background: #fff; position: relative; }
        .color-card.is-owned { background: var(--owned-bg); border: 2px solid var(--owned-border); }
        .count-badge { position: absolute; top: -5px; right: -5px; background: #ff7675; color: white; min-width: 20px; height: 20px; border-radius: 10px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
        
        .color-no { font-size: 0.85rem; font-weight: 800; margin-bottom: 4px; }
        .color-name { font-size: 0.65rem; color: #718096; text-align: center; line-height: 1.2; height: 2.4em; overflow: hidden; }
        
        /* 底部统计栏：放在进度旁边 */
        .summary-bar { margin-top: 30px; padding: 18px; background: var(--primary); color: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .summary-item { font-size: 0.75rem; opacity: 0.9; }
        .summary-item b { display: block; font-size: 1.1rem; margin-top: 4px; opacity: 1; }

        .tip { font-size: 11px; color: #a0aec0; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>PanPastel 库存管理</h2>
        <div class="backup-tools">
            <button class="tool-btn" onclick="exportData()">备份(导出)</button>
            <button class="tool-btn" onclick="importData()">同步(导入)</button>
        </div>
    </div>
    
    <div class="search-box">
        <input type="text" id="colorInput" placeholder="输入色号或5位序列号" inputmode="decimal">
        <button class="add-btn" onclick="toggleByInput()">增加</button>
    </div>

    <div id="mainDisplay"></div>
    
    <!-- 统计栏：总量放在进度旁边 -->
    <div class="summary-bar">
        <div class="summary-grid">
            <div class="summary-item">已入种类<b id="statKinds">0</b></div>
            <div class="summary-item">库存总量<b id="statTotal">0</b></div>
            <div class="summary-item">全系完成度<b id="statPercent">0%</b></div>
        </div>
    </div>

    <div class="tip">💡 点击增加，长按或右键减少数量</div>
    <button onclick="clearAll()" style="width:100%; margin-top:25px; background:none; border:none; color:#bbb; font-size:10px; cursor:pointer;">清空所有本地数据</button>
</div>

        // 大地色
        "740.1": { name: "Burnt Sienna Ex.Dark", cat: "大地/棕色系" },

        "910.5": { name: "Light Gold", cat: "珠光/金属系" },
        "911.5": { name: "Rich Gold", cat: "珠光/金属系" },

        "921.5": { name: "Copper", cat: "珠光/金属系" },
        "930.5": { name: "Bronze", cat: "珠光/金属系" },
        "931.5": { name: "Pewter", cat: "珠光/金属系" },
        "951.5": { name: "Pearlescent White", cat: "珠光/金属系" },
        "952.5": { name: "Pearlescent Yellow", cat: "珠光/金属系" },
        "953.5": { name: "Pearlescent Orange", cat: "珠光/金属系" },
        "954.5": { name: "Pearlescent Red", cat: "珠光/金属系" },

        "011": { name: "Pearl Medium Fine", cat: "珠光/金属系" },
        "012": { name: "Pearl Medium Coarse", cat: "珠光/金属系" }
    };

    // 映射表：处理图片上的 5 位数序列号（Series No.）到色号的转换
    const SERIES_MAP = {
        "22806":"280.6", "23406":"340.6", "23407":"340.7", "23807":"380.7", "24307":"430.7", "24707":"470.7",
        "25206":"520.6", "25207":"520.7", "25607":"560.7", "25807":"580.7", "26207":"620.7", "26407":"640.7",
        "26607":"660.7", "27407":"740.7", "27807":"780.7", "22305":"223.5", "23103":"310.3", "23105":"310.5",
        "23106":"310.6", "23108":"310.8"
    };

    let inventory = JSON.parse(localStorage.getItem('panInventoryV3')) || {};

    // 导出备份：将当前数据编码为一段文本，方便跨手机发送
    function exportData() {
        if (Object.keys(inventory).length === 0) return alert("没有数据可以导出哦。");
        const code = btoa(JSON.stringify(inventory));
        const dummy = document.createElement("input");
        document.body.appendChild(dummy);
        dummy.value = code;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        alert("🎉 备份代码已复制！\n请发送到新手机或保存到备忘录。");
    }

    // 导入备份：在新手机上粘贴代码恢复数据
    function importData() {
        const code = prompt("请粘贴备份代码：");
        if (code) {
            try {
                const data = JSON.parse(atob(code));
                if(confirm("导入后将覆盖当前手机的数据，确认吗？")) {
                    inventory = data;
                    render();
                    alert("✅ 数据已同步！");
                }
            } catch(e) { alert("代码不对，请确认是否复制完整。"); }
        }
    }

    function render() {
        const display = document.getElementById('mainDisplay');
        display.innerHTML = '';
        const cats = {};
        Object.keys(PAN_DATABASE).forEach(no => {
            const c = PAN_DATABASE[no].cat;
            if (!cats[c]) cats[c] = [];
            cats[c].push(no);
        });

        const order = ["基础/灰阶", "黄/橙系", "红/紫系", "蓝系", "绿系", "大地/棕色系", "珠光/金属系"];
        let totalItems = 0; let totalKinds = 0;
        const totalPossible = Object.keys(PAN_DATABASE).length;

        order.forEach(cName => {
            if (!cats[cName]) return;
            const ownedInCat = cats[cName].filter(n => inventory[n] > 0).length;
            const section = document.createElement('div');
            section.innerHTML = `<div class="category-title"><span>${cName}</span><span>${ownedInCat}/${cats[cName].length}</span></div>`;
            const grid = document.createElement('div');
            grid.className = 'color-grid';
            cats[cName].forEach(no => {
                const count = inventory[no] || 0;
                if(count > 0) { totalKinds++; totalItems += count; }
                const card = document.createElement('div');
                card.className = `color-card ${count > 0 ? 'is-owned' : ''}`;
                card.innerHTML = `${count > 0 ? `<div class="count-badge">${count}</div>` : ''}<div class="color-no">${no}</div><div class="color-name">${PAN_DATABASE[no].name}</div>`;
                card.onclick = (e) => { add(no); e.preventDefault(); };
                card.oncontextmenu = (e) => { sub(no); e.preventDefault(); };
                grid.appendChild(card);
            });
            section.appendChild(grid); display.appendChild(section);
        });

        document.getElementById('statKinds').innerText = totalKinds;
        document.getElementById('statTotal').innerText = totalItems;
        document.getElementById('statPercent').innerText = Math.round((totalKinds / totalPossible) * 100) + '%';
        localStorage.setItem('panInventoryV3', JSON.stringify(inventory));
    }

    function add(no) { inventory[no] = (inventory[no] || 0) + 1; render(); }
    function sub(no) { if(inventory[no] > 0) { inventory[no] -= 1; if(inventory[no] === 0) delete inventory[no]; } render(); }
    function toggleByInput() {
        const input = document.getElementById('colorInput');
        let val = input.value.trim();
        if (SERIES_MAP[val]) val = SERIES_MAP[val];
        if (PAN_DATABASE[val]) { add(val); } else { alert("数据库里没这个色号哦"); }
        input.value = '';
    }
    function clearAll() { if(confirm("确定清空吗？")) { inventory = {}; render(); } }
    render();
</script>
</body>
</html>
